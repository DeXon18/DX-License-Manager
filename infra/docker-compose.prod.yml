services:
  nginx-prod:
    image: nginx:1.25-alpine
    container_name: dx-nginx-prod
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./infra/html:/var/www/html:ro

