services:
  nginx-prod:
    image: nginx:1.25-alpine
    container_name: dx-nginx-prod
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html:ro
      # - ./infra/assets:/var/www/assets:ro (DEPRECATED)
    depends_on:
      - php-fpm-prod

  php-fpm-prod:
    build:
      context: ./infra/php
    container_name: dx-php-prod
    restart: always
    mem_limit: 768m
    env_file: ./infra/.env.prod
    volumes:
      - ./backend:/var/www/html
      - ./infra/.env.prod:/var/www/html/.env
      - ./infra/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./backend/storage_prod:/var/www/html/storage
      - ./management:/var/www/management:ro
      - ./scripts:/var/www/html/scripts:ro
      - ./.git:/var/www/html/.git:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mariadb-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  mariadb-prod:
    image: mariadb:10.11
    container_name: dx-mariadb-prod
    restart: always
    mem_limit: 768m
    env_file: ./infra/.env.prod
    volumes:
      - mariadb_prod_data:/var/lib/mysql
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-prod:
    image: redis:7-alpine
    container_name: dx-redis-prod
    restart: always
    mem_limit: 128m
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  node-prod:
    image: node:20-alpine
    container_name: dx-node-prod
    volumes:
      - ./backend:/var/www/html
      - ./infra/.env.prod:/var/www/html/.env
    working_dir: /var/www/html
    user: "1000:1000"
    command: ["tail", "-f", "/dev/null"]

volumes:
  mariadb_prod_data:
  redis_prod_data:
